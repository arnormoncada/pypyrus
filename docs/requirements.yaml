system_requirements:
  notes:
    - Scope marks what is implemented now versus planned extension.

  functional_requirements:
    - id: FR1
      name: Run Lifecycle Traceability
      description: >
        PyPyrus shall create a unique run identifier and persist run start/end,
        code reference, configuration reference, and environment snapshot metadata.
      scope: implemented
      verification: integration_test

    - id: FR2
      name: Dataset Identity Registration
      description: >
        PyPyrus shall register each dataset used in a run with role metadata and
        a stable fingerprint, enabling cross-run identity checks.
      scope: implemented
      verification: integration_test

    - id: FR3
      name: Loader and Batch Stream Logging
      description: >
        PyPyrus shall log loader registrations and batch-delivery events,
        including per-loader step and run-global batch sequence.
      scope: implemented
      verification: integration_test

    - id: FR4
      name: Sample Identity and Batch Fingerprinting
      description: >
        PyPyrus shall assign normalized sample identifiers and compute an ordered
        batch fingerprint to support deterministic stream comparison.
      scope: implemented
      verification: integration_test

    - id: FR5
      name: Transform Declaration Capture
      description: >
        PyPyrus shall record declared preprocessing/transform pipeline metadata
        when introspection is available at attachment time.
      scope: implemented_best_effort
      verification: integration_test

    - id: FR6
      name: Query and Inspection Interface
      description: >
        PyPyrus shall expose programmatic query helpers and CLI commands for run
        overview, batch inspection, and sample occurrence lookup.
      scope: implemented
      verification: integration_test

    - id: FR7
      name: Cross-Run Dataset Comparison
      description: >
        PyPyrus shall compare runs by role and report whether dataset identities
        match for each role.
      scope: implemented
      verification: integration_test

    - id: FR8
      name: Cross-Run Batch Stream Comparison
      description: >
        PyPyrus shall compare role-aligned batch streams and report first
        divergence step when stream mismatch occurs.
      scope: implemented
      verification: integration_test

  non_functional_requirements:
    - id: NFR1
      name: Runtime Overhead Budget
      description: >
        Instrumentation overhead shall remain within an evaluation-defined budget
        on representative workloads.
      scope: implemented
      verification: benchmark

    - id: NFR2
      name: Storage Efficiency
      description: >
        Provenance storage shall use compact encodings for high-cardinality data
        and avoid unbounded per-batch metadata expansion.
      scope: implemented
      verification: benchmark

    - id: NFR3
      name: Single-Node Reliability
      description: >
        The system shall operate reliably for single-node training with standard
        multiprocessing data-loading settings.
      scope: implemented
      verification: integration_test

    - id: NFR4
      name: Modular Storage Backends
      description: >
        Persistence shall be defined behind a storage interface so concrete
        backends can be swapped without changing event semantics.
      scope: implemented
      verification: architecture_review

    - id: NFR5
      name: Framework Adaptability
      description: >
        Instrumentation architecture shall support framework-specific adapters,
        with PyTorch as the current concrete adapter.
      scope: partial
      verification: architecture_review

    - id: NFR6
      name: Stable Event Semantics
      description: >
        Event field meanings shall remain deterministic across versions, and
        schema evolution shall preserve interpretability of historical runs.
      scope: partial
      verification: architecture_review

    - id: NFR7
      name: Integration Usability
      description: >
        Integrating PyPyrus into existing training code shall require only local
        DataLoader wrapping and run scoping, without invasive pipeline rewrites.
      scope: implemented
      verification: usability_demo

    - id: NFR8
      name: Distributed Extensibility
      description: >
        The design shall admit future extension to multi-process or multi-node
        training.
      scope: planned
      verification: design_validation
